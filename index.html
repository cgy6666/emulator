<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟器列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .emulator-list {
            padding: 20px;
        }

        .emulator-item {
            display: block;
            padding: 18px 24px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .emulator-item:last-child {
            margin-bottom: 0;
        }

        .emulator-item:hover {
            background: #fff;
            border-color: #667eea;
            transform: translateX(8px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .emulator-item .icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 10px;
            font-size: 18px;
            margin-right: 16px;
            vertical-align: middle;
        }

        .emulator-item .name {
            font-size: 16px;
            font-weight: 500;
            vertical-align: middle;
        }

        .emulator-item .arrow {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .emulator-item:hover .arrow {
            color: #667eea;
            right: 20px;
        }

        .category {
            padding: 16px 24px 8px;
            font-size: 13px;
            color: #999;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            padding: 20px 30px;
            text-align: center;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px 10px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .emulator-item {
                padding: 14px 18px;
            }

            .emulator-item .icon {
                width: 36px;
                height: 36px;
                line-height: 36px;
                font-size: 16px;
                margin-right: 12px;
            }

            .emulator-item .name {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 模拟器列表</h1>
            <p>选择你想玩的模拟器，开始游戏之旅</p>
        </div>

        <div class="emulator-list">
            <!-- OI类 -->
            <div class="category">OI类</div>
            
            <a href="AFO/index.html" class="emulator-item">
                <span class="icon">🕹️</span>
                <span class="name">竞赛 AFO 模拟器</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer">
            XQYH © 2026 模拟器集合站 | 仅供学习交流使用 | 均在洛谷搜索
        </div>
    </div>
</body>
</html>
